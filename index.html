<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <section class="calculator-sec">
    <div class="wrapper">
      <input type="text" id="show-text" placeholder="0" />
      <table>
        <tr>
          <td><button id="clearbtn" type="reset" class="redbtn">C</button></td>
          <td><button id="squarebtn" type="button" class="redbtn">x²</button></td>
          <td><button id="cubebtn" type="button" class="redbtn">x³</button></td>
          <td><button type="button" class="greenbtn"> + </button></td>
        </tr>
        <tr>
          <td><button type="button" class="greybtn"> 7 </button></td>
          <td><button type="button" class="greybtn"> 8 </button></td>
          <td><button type="button" class="greybtn"> 9 </button></td>
          <td><button type="button" class="greenbtn"> - </button></td>
        </tr>
        <tr>
          <td><button type="button" class="greybtn"> 4 </button></td>
          <td><button type="button" class="greybtn"> 5</button></td>
          <td><button type="button" class="greybtn"> 6 </button></td>
          <td><button type="button" class="greenbtn"> * </button></td>
        </tr>
        <tr>
          <td><button type="button" class="greybtn"> 3 </button></td>
          <td><button type="button" class="greybtn">2</button></td>
          <td><button type="button" class="greybtn"> 1 </button></td>
          <td><button type="button" class="greenbtn"> / </button></td>
        </tr>
        <tr>
          <td><button type="button" class="greybtn full-width">0</button></td>
          <td><button type="button" class="greybtn full-width">.</button></td>
          <td colspan="2"><button id="submit" type="button" class="greenbtn full-width"> = </button></td>
        </tr>
      </table>
    </div>
  </section>

  <script src="js/index.js"></script>
</body>

</html>
